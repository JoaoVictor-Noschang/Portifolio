<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/database-svgrepo-com.svg" type="image/svg">
    <title>Modelo Conceitual Relacional</title>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: 'Ubuntu', sans-serif;
        }

        body {
            background: rgb(19, 19, 19);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        main {
            width: 95%;
            margin: 10px auto;
            border-radius: 10px;
            background-color: rgb(227, 227, 227);
            box-shadow: 0px 2px 10px rgba(255, 255, 255, 0.208);
        }

        h1, p, figcaption {
            padding: 10px;
            text-align: center;
        }

        figure {
            width: 100%;
        }

        img {
            width: 100%;
        }

        a {
            text-decoration: none;
            color: #8200fc;
            text-shadow: 0px 2px 10px #8200fc99;
            font-weight: 500;
        }

    <main>
        <h1>Modelo Relacional Conceitual</h1>
